# =============================================================================
# Optional: ar-io-bundler for optimistic C2PA indexing
# =============================================================================
# Layer on top of docker-compose.local.yaml for immediate data availability:
#
#   docker compose \
#     -f docker-compose.local.yaml \
#     -f docker-compose.bundler.yaml \
#     up -d
#
# This adds a self-hosted bundler that stores data items in MinIO and makes
# them immediately available through the gateway via optimistic caching,
# eliminating the wait for L1 confirmation before soft binding API queries.
#
# Upload to the bundler by setting UPLOAD_SERVICE_URL to the public bundler URL
# (e.g. https://ario.agenticway.io/bundler) in turbo-c2pa SDK consumers.
# The bundler is exposed publicly via the Nginx reverse proxy (see
# apps/gateway/nginx/ario-agenticway for the /bundler/ location block).
#
# Required env vars: ADMIN_API_KEY (shared with gateway for optical bridging)
#
# Prerequisite: bundler app images must be built locally before starting:
#   git clone https://github.com/vilenarios/ar-io-bundler.git && cd ar-io-bundler
#   docker build -t ar-io-bundler-upload:latest -f /path/to/ar-io-node-project/docker/bundler.Dockerfile .
#   docker build -t ar-io-bundler-payment:latest -f /path/to/ar-io-node-project/docker/bundler.Dockerfile .
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # ar-io-bundler upload service (receives data items)
  # ---------------------------------------------------------------------------
  bundler-upload:
    image: ${BUNDLER_UPLOAD_IMAGE:-ar-io-bundler-upload:latest}
    restart: unless-stopped
    ports:
      - '${BUNDLER_UPLOAD_PORT:-3001}:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://${BUNDLER_POSTGRES_USER:-bundler}:${BUNDLER_POSTGRES_PASSWORD:-bundler}@bundler-postgres:5432/${BUNDLER_POSTGRES_DB:-bundler}
      - REDIS_CACHE_URL=redis://bundler-redis-cache:6379
      - REDIS_QUEUE_URL=redis://bundler-redis-queue:6379
      - MINIO_ENDPOINT=bundler-minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${BUNDLER_MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${BUNDLER_MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${BUNDLER_MINIO_BUCKET:-ar-io-bundler}
      # Optical bridging pushes data directly to the gateway for immediate indexing.
      # ADMIN_API_KEY must match the gateway's ADMIN_API_KEY.
      - OPTICAL_BRIDGING_ENABLED=true
      - AR_IO_ADMIN_URL=http://core:4000
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - AR_IO_WALLET=${AR_IO_WALLET:-}
    depends_on:
      core:
        condition: service_started
      bundler-postgres:
        condition: service_healthy
      bundler-redis-cache:
        condition: service_healthy
      bundler-redis-queue:
        condition: service_healthy
      bundler-minio:
        condition: service_started
    networks:
      - ar-io-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ar-io-bundler payment service (pricing + x402)
  # ---------------------------------------------------------------------------
  bundler-payment:
    image: ${BUNDLER_PAYMENT_IMAGE:-ar-io-bundler-payment:latest}
    restart: unless-stopped
    ports:
      - '${BUNDLER_PAYMENT_PORT:-4002}:4001'
    environment:
      - NODE_ENV=development
      - PORT=4001
      - SERVICE=payment
      - DATABASE_URL=postgresql://${BUNDLER_POSTGRES_USER:-bundler}:${BUNDLER_POSTGRES_PASSWORD:-bundler}@bundler-postgres:5432/${BUNDLER_POSTGRES_DB:-bundler}
      - REDIS_CACHE_URL=redis://bundler-redis-cache:6379
      - AR_IO_GATEWAY_URL=http://core:4000
    depends_on:
      core:
        condition: service_started
      bundler-postgres:
        condition: service_healthy
      bundler-redis-cache:
        condition: service_healthy
    networks:
      - ar-io-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Bundler infrastructure: PostgreSQL
  # ---------------------------------------------------------------------------
  bundler-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${BUNDLER_POSTGRES_USER:-bundler}
      - POSTGRES_PASSWORD=${BUNDLER_POSTGRES_PASSWORD:-bundler}
      - POSTGRES_DB=${BUNDLER_POSTGRES_DB:-bundler}
    volumes:
      - bundler-postgres-data:/var/lib/postgresql/data
    networks:
      - ar-io-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${BUNDLER_POSTGRES_USER:-bundler}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Bundler infrastructure: Redis (cache)
  # ---------------------------------------------------------------------------
  bundler-redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - ar-io-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Bundler infrastructure: Redis (job queue)
  # ---------------------------------------------------------------------------
  bundler-redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - ar-io-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Bundler infrastructure: MinIO (S3-compatible object storage)
  # No healthcheck — mc/curl/wget are absent from minio/minio:latest.
  # bundler-upload uses service_started with start_period instead.
  # ---------------------------------------------------------------------------
  bundler-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '${BUNDLER_MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      - MINIO_ROOT_USER=${BUNDLER_MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${BUNDLER_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - bundler-minio-data:/data
    networks:
      - ar-io-network

volumes:
  bundler-postgres-data:
  bundler-minio-data:

networks:
  ar-io-network:
    external: true
    name: ar-io-network
