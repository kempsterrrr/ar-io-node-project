# Production overlay for gateway operators
# Usage: docker compose -f apps/gateway/docker-compose.yaml -f packages/verify-sidecar/docker-compose.verify.yaml up -d
services:
  verify-sidecar:
    image: ${VERIFY_SIDECAR_IMAGE:-ghcr.io/ar-io/verify-sidecar:${VERIFY_SIDECAR_TAG:-latest}}
    restart: unless-stopped
    expose:
      - '4001'
    env_file:
      - path: ${VERIFY_SIDECAR_ENV_FILE:-.env.docker}
        required: false
    environment:
      - GATEWAY_URL=http://envoy:3000
      - GATEWAY_HOST=${GATEWAY_HOST:-}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SQLITE_PATH=/app/data/verify.db
      - SIGNING_KEY_PATH=${WALLET_FILE:+/app/wallet.json}
    volumes:
      - ${VERIFY_SIDECAR_DATA_DIR:-./verify-data}:/app/data
      - ${WALLET_FILE:-/dev/null}:/app/wallet.json:ro
    networks:
      - ar-io-network
    depends_on:
      - core
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  verify-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${VERIFY_PORT:-4001}:80'
    volumes:
      - ${VERIFY_SIDECAR_NGINX_CONF:-./nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - verify-sidecar
    networks:
      - ar-io-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ar-io-network:
    name: ar-io-network
