events {
    worker_connections 1024;
}

http {
    upstream sidecar {
        server verify-sidecar:4001;
    }

    server {
        listen 80;

        # Public endpoints
        location /health {
            proxy_pass http://sidecar;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://sidecar;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        # Frontend static files and SPA routing
        location / {
            proxy_pass http://sidecar;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
