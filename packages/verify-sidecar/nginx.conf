upstream verify {
    server verify-sidecar:4001;
}

server {
    listen 80;
    server_name _;

    location /health {
        proxy_pass http://verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }

    location / {
        proxy_pass http://verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
