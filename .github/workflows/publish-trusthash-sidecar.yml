# =============================================================================
# Deploy Trusthash Sidecar to Hetzner
# =============================================================================
# Builds the sidecar image from source on the server and deploys it
# alongside the gateway. No GHCR publish — builds directly from git.
#
# Required Secrets:
#   - HETZNER_HOST: Server IP or hostname
#   - HETZNER_USER: SSH username
#   - HETZNER_SSH_KEY: Private SSH key
# =============================================================================

name: Deploy Trusthash Sidecar

on:
  push:
    branches:
      - main
    paths:
      - 'packages/trusthash-sidecar/**'
      - '.github/workflows/publish-trusthash-sidecar.yml'
  workflow_dispatch:

env:
  DEPLOY_PATH: ~/ar-io-gateway
  SIDECAR_DIR: sidecar
  REPO_PATH: ~/ar-io-node-project

concurrency:
  group: trusthash-sidecar-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Deploy Sidecar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.HETZNER_HOST }}" ]; then
            echo "HETZNER_HOST secret is not set. Skipping deployment." >&2
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or update repo on server
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            set -euo pipefail

            REPO_DIR="${HOME}/ar-io-node-project"

            if [ -d "${REPO_DIR}/.git" ]; then
              cd "${REPO_DIR}"
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git "${REPO_DIR}"
              cd "${REPO_DIR}"
            fi

            echo "Repo updated to $(git rev-parse --short HEAD)"
          EOF

      - name: Create sidecar directory
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            mkdir -p ${{ env.DEPLOY_PATH }}/${{ env.SIDECAR_DIR }}/data
          EOF

      - name: Copy sidecar config files
        run: |
          scp packages/trusthash-sidecar/docker-compose.sidecar.yaml \
              packages/trusthash-sidecar/.env.docker \
              packages/trusthash-sidecar/nginx.conf \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ env.DEPLOY_PATH }}/${{ env.SIDECAR_DIR }}/

      - name: Build and deploy sidecar
        env:
          SIGNING_CERT_PEM: ${{ secrets.SIGNING_CERT_PEM }}
          SIGNING_PRIVATE_KEY_PEM: ${{ secrets.SIGNING_PRIVATE_KEY_PEM }}
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << EOF
            set -euo pipefail

            cd ${{ env.DEPLOY_PATH }}

            if [ ! -f docker-compose.yaml ]; then
              echo "Missing gateway docker-compose.yaml in ${{ env.DEPLOY_PATH }}. Deploy the gateway first." >&2
              exit 1
            fi

            docker network create ar-io-network >/dev/null 2>&1 || true

            # Build sidecar image from repo root (workspace dependencies require root context)
            REPO_DIR="\${HOME}/ar-io-node-project"
            docker build -t trusthash-sidecar:latest -f "\${REPO_DIR}/packages/trusthash-sidecar/Dockerfile" "\${REPO_DIR}"

            # Deploy with the locally-built image + signing secrets
            TRUSTHASH_SIDECAR_IMAGE=trusthash-sidecar:latest \
            TRUSTHASH_SIDECAR_ENV_FILE=./${{ env.SIDECAR_DIR }}/.env.docker \
            TRUSTHASH_SIDECAR_DATA_DIR=./${{ env.SIDECAR_DIR }}/data \
            TRUSTHASH_SIDECAR_NGINX_CONF=./${{ env.SIDECAR_DIR }}/nginx.conf \
            ENABLE_SIGNING=\${SIGNING_CERT_PEM:+true} \
            SIGNING_CERT_PEM="${SIGNING_CERT_PEM}" \
            SIGNING_PRIVATE_KEY_PEM="${SIGNING_PRIVATE_KEY_PEM}" \
            docker compose -f docker-compose.yaml -f ${{ env.SIDECAR_DIR }}/docker-compose.sidecar.yaml up -d

            echo "Waiting for sidecar to start..."
            sleep 5

            echo "Container status:"
            docker compose -f docker-compose.yaml -f ${{ env.SIDECAR_DIR }}/docker-compose.sidecar.yaml ps
          EOF

      - name: Deployment summary
        run: |
          {
            echo "## Sidecar Deployment Complete"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Build:** from source (no GHCR)"
            echo "**Time (UTC):** $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "$GITHUB_STEP_SUMMARY"
