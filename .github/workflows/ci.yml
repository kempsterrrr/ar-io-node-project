# =============================================================================
# Continuous Integration
# =============================================================================
# Runs on all pull requests and pushes to main.
# Validates code quality and configuration.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

  validate-docker:
    name: Validate Docker Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create test .env file
        run: |
          cp apps/gateway/.env.example apps/gateway/.env

      - name: Validate docker-compose.yaml
        run: |
          cd apps/gateway
          docker compose config --quiet

      - name: Validate docker-compose with dev overrides
        run: |
          cd apps/gateway
          docker compose -f docker-compose.yaml -f docker-compose.dev.yaml config --quiet

      - name: Validate local gateway + sidecar compose
        run: |
          docker compose -f docker-compose.local.yaml config --quiet

      - name: Validate verify sidecar compose overlay
        run: |
          cd apps/gateway
          docker compose -f docker-compose.yaml -f ../../packages/verify-sidecar/docker-compose.verify.yaml config --quiet

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm run build

  api-test-sync:
    name: API Test Sync Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check API test sync
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          ROUTE_CHANGES=$(git diff --name-only "$BASE"...HEAD -- \
            'packages/*/src/routes/**' \
            'packages/*/src/index.ts' | head -20)
          API_TEST_CHANGES=$(git diff --name-only "$BASE"...HEAD -- 'api-tests/' | head -20)
          if [ -n "$ROUTE_CHANGES" ] && [ -z "$API_TEST_CHANGES" ]; then
            echo "::warning::API route files changed but api-tests/ was not updated. Please update Bruno API tests to match."
            echo "Changed route files:"
            echo "$ROUTE_CHANGES"
          else
            echo "API test sync check passed."
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        continue-on-error: true # Don't fail PR, just report

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0' # Report only, don't fail
          format: 'table'
