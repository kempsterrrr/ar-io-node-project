# =============================================================================
# Deploy Gateway to Hetzner
# =============================================================================
# Triggers on push to main branch when gateway files change.
# SSHs into the Hetzner server and updates the running containers.
#
# Required Secrets:
#   - HETZNER_HOST: Server IP or hostname
#   - HETZNER_USER: SSH username (usually 'root')
#   - HETZNER_SSH_KEY: Private SSH key for authentication
#   - AR_IO_WALLET: Gateway operator wallet address
#   - OBSERVER_WALLET: Observer hot wallet address
#   - OBSERVER_WALLET_KEY: Observer wallet keyfile contents (JSON)
#
# Required Secrets (continued):
#   - ARNS_ROOT_HOST: Your domain name for ArNS routing
#   - ADMIN_API_KEY: Shared key for gateway admin API and bundler optical bridging
#
# Optional Variables:
#   - GRAPHQL_HOST: GraphQL endpoint (default: arweave.net)
#   - START_HEIGHT: Starting block height for indexing
# =============================================================================

name: Deploy Gateway

on:
  push:
    branches:
      - main
    paths:
      - 'apps/gateway/**'
      - 'packages/trusthash-sidecar/docker-compose.sidecar.yaml'
      - 'packages/trusthash-sidecar/.env.docker'
      - 'packages/trusthash-sidecar/nginx.conf'
      - 'packages/verify-sidecar/docker-compose.verify.yaml'
      - 'packages/verify-sidecar/.env.docker'
      - 'packages/verify-sidecar/nginx.conf'
      - 'docker-compose.bundler.yaml'
      - '.github/workflows/deploy-gateway.yml'
  workflow_dispatch:
    inputs:
      force_pull:
        description: 'Force pull latest Docker images'
        required: false
        default: 'false'
        type: boolean

env:
  DEPLOY_PATH: ~/ar-io-gateway

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.HETZNER_HOST }}" ]; then
            echo "HETZNER_HOST secret is not set. Skipping deployment." >&2
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            mkdir -p ${{ env.DEPLOY_PATH }}
            mkdir -p ${{ env.DEPLOY_PATH }}/wallets
            mkdir -p ${{ env.DEPLOY_PATH }}/sidecar/data
            mkdir -p ${{ env.DEPLOY_PATH }}/verify-sidecar/data
          EOF

      - name: Copy gateway files
        run: |
          scp -r apps/gateway/docker-compose.yaml \
              apps/gateway/docker-compose.dev.yaml \
              apps/gateway/scripts \
              apps/gateway/nginx \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Copy trusthash sidecar files
        run: |
          scp packages/trusthash-sidecar/docker-compose.sidecar.yaml \
              packages/trusthash-sidecar/.env.docker \
              packages/trusthash-sidecar/nginx.conf \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ env.DEPLOY_PATH }}/sidecar/

      - name: Copy verify sidecar files
        run: |
          scp packages/verify-sidecar/docker-compose.verify.yaml \
              packages/verify-sidecar/.env.docker \
              packages/verify-sidecar/nginx.conf \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ env.DEPLOY_PATH }}/verify-sidecar/

      - name: Copy bundler compose file
        run: |
          scp docker-compose.bundler.yaml \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Deploy nginx config
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            # Remove stale config that conflicts with ario-agenticway
            rm -f /etc/nginx/sites-enabled/ario /etc/nginx/sites-available/ario
            cp ${{ env.DEPLOY_PATH }}/nginx/ario-agenticway /etc/nginx/sites-available/ario-agenticway
            ln -sf /etc/nginx/sites-available/ario-agenticway /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx
          EOF

      - name: Generate .env file
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << EOF
            cat > ${{ env.DEPLOY_PATH }}/.env << 'ENVFILE'
          # Generated by GitHub Actions on $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Commit: ${{ github.sha }}

          # Network Configuration
          GRAPHQL_HOST=${{ vars.GRAPHQL_HOST || 'arweave.net' }}
          GRAPHQL_PORT=443
          START_HEIGHT=${{ vars.START_HEIGHT || '0' }}

          # Gateway Identity
          AR_IO_WALLET=${{ secrets.AR_IO_WALLET }}
          OBSERVER_WALLET=${{ secrets.OBSERVER_WALLET }}
          ARNS_ROOT_HOST=${{ secrets.ARNS_ROOT_HOST || '' }}

          # Observer Configuration
          RUN_OBSERVER=${{ vars.RUN_OBSERVER || 'true' }}

          # Trusthash Sidecar (compose overlay)
          TRUSTHASH_SIDECAR_IMAGE=trusthash-sidecar:latest
          TRUSTHASH_SIDECAR_ENV_FILE=./sidecar/.env.docker
          TRUSTHASH_SIDECAR_DATA_DIR=./sidecar/data
          TRUSTHASH_SIDECAR_NGINX_CONF=./sidecar/nginx.conf

          # Verify Sidecar (compose overlay)
          VERIFY_SIDECAR_IMAGE=verify-sidecar:latest
          VERIFY_SIDECAR_DATA_DIR=./verify-sidecar/data
          VERIFY_SIDECAR_NGINX_CONF=./verify-sidecar/nginx.conf

          # C2PA Webhook & Indexing
          WEBHOOK_TARGET_SERVERS=http://trusthash-sidecar:3003/webhook
          WEBHOOK_INDEX_FILTER={"tags":[{"name":"Protocol","value":"C2PA-Manifest-Proof"}]}
          ANS104_INDEX_FILTER={"tags":[{"name":"Protocol","value":"C2PA-Manifest-Proof"}]}
          ANS104_UNBUNDLE_FILTER={"tags":[{"name":"Protocol","value":"C2PA-Manifest-Proof"}]}
          ANS104_UNBUNDLE_WORKERS=1

          # Bundler / Optical Bridging
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}

          # Envoy Peer EDS
          ENABLE_ARWEAVE_PEER_EDS=${{ vars.ENABLE_ARWEAVE_PEER_EDS || 'true' }}

          # Production Settings
          LOG_LEVEL=${{ vars.LOG_LEVEL || 'info' }}
          TRUSTED_NODE_URL=${{ vars.TRUSTED_NODE_URL || 'https://arweave.net' }}
          ENVFILE
          EOF

      - name: Write observer wallet keyfile
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << EOF
            if [ -n '${{ secrets.OBSERVER_WALLET_KEY }}' ]; then
              echo '${{ secrets.OBSERVER_WALLET_KEY }}' > ${{ env.DEPLOY_PATH }}/wallets/${{ secrets.OBSERVER_WALLET }}.json
              chmod 600 ${{ env.DEPLOY_PATH }}/wallets/${{ secrets.OBSERVER_WALLET }}.json
              echo "Observer wallet keyfile written"
            else
              echo "No observer wallet key provided, skipping"
            fi
          EOF

      - name: Clean up Docker resources
        if: ${{ github.event.inputs.force_pull == 'true' || github.event_name == 'push' }}
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            echo "=== Disk usage before cleanup ==="
            df -h /
            docker system df

            echo "=== Cleaning up unused Docker images ==="
            docker image prune -af 2>/dev/null || true

            echo "=== Disk usage after cleanup ==="
            df -h /
            docker system df
          EOF

      - name: Pull latest images
        if: ${{ github.event.inputs.force_pull == 'true' || github.event_name == 'push' }}
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            # Pull gateway + bundler images (sidecars are built locally)
            docker compose -f docker-compose.yaml \
              -f docker-compose.bundler.yaml \
              pull
          EOF

      - name: Build sidecar images
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << EOF
            set -euo pipefail
            REPO_DIR="\${HOME}/ar-io-node-project"
            if [ ! -d "\${REPO_DIR}/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "\${REPO_DIR}"
            fi
            cd "\${REPO_DIR}"
            git fetch origin
            git reset --hard
            git clean -fd
            git checkout ${{ github.sha }}
            echo "Building trusthash sidecar..."
            docker build -t trusthash-sidecar:latest -f packages/trusthash-sidecar/Dockerfile .
            echo "Building verify sidecar..."
            docker build -t verify-sidecar:latest -f packages/verify-sidecar/Dockerfile .
          EOF

      - name: Write signing secrets to server
        env:
          SIGNING_CERT_PEM: ${{ secrets.SIGNING_CERT_PEM }}
          SIGNING_PRIVATE_KEY_PEM: ${{ secrets.SIGNING_PRIVATE_KEY_PEM }}
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/sidecar"
          if [ -n "${SIGNING_CERT_PEM}" ]; then
            echo "${SIGNING_CERT_PEM}" | ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "cat > ${{ env.DEPLOY_PATH }}/sidecar/.signing-cert-pem"
            echo "${SIGNING_PRIVATE_KEY_PEM}" | ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "cat > ${{ env.DEPLOY_PATH }}/sidecar/.signing-key-pem"
            ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "chmod 600 ${{ env.DEPLOY_PATH }}/sidecar/.signing-cert-pem ${{ env.DEPLOY_PATH }}/sidecar/.signing-key-pem"
            echo "Signing secrets written to server"
          else
            ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "rm -f ${{ env.DEPLOY_PATH }}/sidecar/.signing-cert-pem ${{ env.DEPLOY_PATH }}/sidecar/.signing-key-pem"
            echo "No signing secrets configured — removed stale files if any"
          fi

      - name: Deploy containers
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            # Read signing secrets from files if present
            ENABLE_SIGNING=false
            SIGNING_CERT_PEM=""
            SIGNING_PRIVATE_KEY_PEM=""
            if [ -f sidecar/.signing-cert-pem ]; then
              ENABLE_SIGNING=true
              SIGNING_CERT_PEM="$(cat sidecar/.signing-cert-pem)"
              SIGNING_PRIVATE_KEY_PEM="$(cat sidecar/.signing-key-pem)"
            fi

            export TRUSTHASH_SIDECAR_IMAGE=trusthash-sidecar:latest
            export TRUSTHASH_SIDECAR_ENV_FILE=./sidecar/.env.docker
            export TRUSTHASH_SIDECAR_DATA_DIR=./sidecar/data
            export TRUSTHASH_SIDECAR_NGINX_CONF=./sidecar/nginx.conf
            export ENABLE_SIGNING="${ENABLE_SIGNING}"
            export SIGNING_CERT_PEM="${SIGNING_CERT_PEM}"
            export SIGNING_PRIVATE_KEY_PEM="${SIGNING_PRIVATE_KEY_PEM}"
            export VERIFY_SIDECAR_IMAGE=verify-sidecar:latest
            export VERIFY_SIDECAR_ENV_FILE=./verify-sidecar/.env.docker
            export VERIFY_SIDECAR_DATA_DIR=./verify-sidecar/data
            export VERIFY_SIDECAR_NGINX_CONF=./verify-sidecar/nginx.conf

            docker compose -f docker-compose.yaml \
              -f sidecar/docker-compose.sidecar.yaml \
              -f verify-sidecar/docker-compose.verify.yaml \
              -f docker-compose.bundler.yaml \
              up -d

            # Force-recreate both proxies so nginx resolves the new sidecar IPs
            # (docker compose up -d only recreates containers with config changes,
            # but the proxy's config doesn't change when the sidecar is rebuilt)
            docker compose -f docker-compose.yaml \
              -f sidecar/docker-compose.sidecar.yaml \
              -f verify-sidecar/docker-compose.verify.yaml \
              -f docker-compose.bundler.yaml \
              up -d --force-recreate trusthash-proxy verify-proxy
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            
            echo "Waiting for gateway to start..."
            sleep 10
            
            echo "Container status:"
            docker compose -f docker-compose.yaml \
              -f sidecar/docker-compose.sidecar.yaml \
              -f verify-sidecar/docker-compose.verify.yaml \
              -f docker-compose.bundler.yaml \
              ps

            echo ""
            echo "Gateway health check:"
            curl -s http://localhost:4000/ar-io/info || echo "Gateway not responding yet (may still be starting)"

            echo ""
            echo "Verify sidecar health check:"
            curl -s http://localhost:4001/health || echo "Verify sidecar not responding yet (may still be starting)"

            echo ""
            echo "Bundler health check:"
            curl -s http://localhost:3001/health || echo "Bundler not responding yet (may still be starting)"
          EOF

      - name: Deployment summary
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Time (UTC):** $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "$GITHUB_STEP_SUMMARY"
