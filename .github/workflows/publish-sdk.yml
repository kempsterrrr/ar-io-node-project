name: Publish @ar-io/sdk

on:
  push:
    paths:
      - 'packages/sdk/**'
      - 'packages/c2pa-protocol/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @ar-io/c2pa-protocol build

      - name: Build SDK
        run: pnpm --filter @ar-io/sdk build

      - name: Run tests
        run: pnpm --filter @ar-io/sdk test

      - name: Check formatting
        run: pnpm --filter @ar-io/sdk format:check

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event.inputs.dry_run != 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @ar-io/c2pa-protocol build && pnpm --filter @ar-io/sdk build

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/sdk/package.json').version")
          PUBLISHED=$(npm view @ar-io/sdk version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $CURRENT (was $PUBLISHED)"
          fi

      - name: Publish
        if: steps.version.outputs.skip != 'true'
        run: pnpm --filter @ar-io/sdk publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
